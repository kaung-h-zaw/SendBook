<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>SendBook • Receiver</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="/sendbook-logo.svg" type="image/svg+xml" />
    <link rel="shortcut icon" href="/sendbook-logo.svg" type="image/svg+xml" />
    <meta name="sendo-api-base" content="" />

    <meta name="sendo-session-id" content="" />
    <meta name="sendo-receiver-token" content="" />

    <style>
      :root {
        --ink: #000;
        --muted: #444;
        --border: #888;
        --paper: #fff;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        background: #fff;
        color: #000;
        font-family: -apple-system, system-ui, Segoe UI, Roboto, Arial,
          sans-serif;
      }
      .wrap {
        max-width: 480px;
        margin: 0 auto 24px;
        padding: 0 10px;
      }
      h1 {
        text-align: center;
        font-size: 22px;
        margin: 14px 0 2px;
      }
      .sub {
        text-align: center;
        color: #444;
        font-size: 12px;
        margin-bottom: 10px;
      }
      .card {
        background: #fff;
        border: 1px solid #888;
        border-radius: 10px;
        padding: 12px;
        text-align: center;
      }
      .key {
        letter-spacing: 8px;
        font-family: ui-monospace, Menlo, Consolas, monospace;
        font-size: 22px;
        border: 1px solid #888;
        border-radius: 8px;
        padding: 8px 10px;
        margin-bottom: 10px;
      }
      #qr {
        display: block;
        width: 180px;
        height: 180px;
        margin: 10px auto 0;
        border: 1px solid #888;
        border-radius: 6px;
      }
      .btn {
        display: block;
        width: 100%;
        padding: 12px 14px;
        border: 1px solid #888;
        border-radius: 10px;
        background: #eee;
        color: #000;
        font-weight: 700;
        text-decoration: none;
        margin-top: 12px;
      }
      #status,
      #debug {
        text-align: center;
        font-size: 12px;
        margin-top: 8px;
        min-height: 1em;
      }
      #debug {
        color: #b00;
      }
      footer {
        text-align: center;
        font-size: 12px;
        color: #000;
        margin-top: 14px;
      }
      .brand {
        text-align: center;
        margin-top: 10px;
      }
      .brand-logo {
        width: 30px;
        height: 30px;
        display: inline-block;
        vertical-align: middle;
        margin-right: 8px;
      }
      .brand-text {
        display: inline-block;
        vertical-align: middle;
        font-size: 22px;
        font-weight: 700;
        line-height: 1;
      }
    </style>
  </head>
  <body>
    <div
      id="notice"
      style="
        display: none;
        position: fixed;
        left: 14px;
        right: 14px;
        width: auto;
        max-width: none;
        transform: none;
        bottom: 14px;
        bottom: calc(14px + env(safe-area-inset-bottom));
        z-index: 9999;
        box-sizing: border-box;
        padding: 10px 12px;
        border: 1px solid #bbb;
        border-radius: 8px;
        background: #f3f3f3;
        color: #000;
        font-size: 13px;
        line-height: 1.35;
        text-align: center;
        white-space: normal;
        overflow-wrap: anywhere;
        word-break: break-word;
      "
    ></div>
    <div class="brand">
      <img src="/sendbook-logo.svg" alt="SendBook logo" class="brand-logo" />
      <span class="brand-text">SendBook</span>
    </div>
    <h1>Send to Kobo/Kindle</h1>
    <div class="sub">E-reader friendly • no animations</div>
    <div
      style="
        text-align: center;
        font-size: 12px;
        color: #444;
        padding: 0 10px;
        line-height: 1.4;
        margin-bottom: 10px;
      "
    >
      If the QR and code don’t appear, please wait
      <strong>20–60&nbsp;seconds</strong>.
    </div>

    <div class="wrap">
      <div class="card" id="sessionBox">
        <div class="key" id="code">----</div>
        <img id="qr" alt="QR code" />
        <a
          id="downloadBtn"
          class="btn"
          style="display: none"
          href="#"
          >Download file</a
        >
        <div id="status">Creating session…</div>
        <div id="debug"></div>
      </div>
      <footer>© 2026 SendBook. All rights reserved.</footer>
    </div>

    <script src="/receiver.js?v=spa-legacy-7" type="text/javascript"></script>
  </body>
</html>
